services:

    # --- Database
    db:
        image: postgres:16
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - "${POSTGRES_PORT}:${POSTGRES_PORT}"
        restart: unless-stopped
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    
    # --- .NET Application
    api:
        build:
            context: ./api
            dockerfile: dockerfile
        depends_on:
            - db
        environment:
            ConnectionStrings__Default: "Host=db;Port=${POSTGRES_PORT};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
            ASPNETCORE_URLS: http://0.0.0.0:5201
        ports:
            - "5201:5201"
        volumes:
            - ./api:/api

    # --- CMS
    cms:
        build:
            context: ./cms
            dockerfile: dockerfile
        depends_on:
            - db
        ports:
            - "1337:1337"
        volumes:
            - strapi_uploads:/cms/public/uploads

volumes:
    postgres_data:
    strapi_uploads: