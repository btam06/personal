services:
    # --- Server
    server:
        image: nginx:1.27.4-alpine
        ports:
            - "80:80"
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - api
            - front
        restart: unless-stopped

    # --- Database
    db:
        image: postgres:16
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        restart: unless-stopped
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

    # --- .NET Application
    api:
        build:
            context: ./api
            dockerfile: dockerfile
        depends_on:
            - db
        environment:
            ConnectionStrings__Default: "Host=db;Port=${POSTGRES_PORT};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
            ASPNETCORE_URLS: http://0.0.0.0:5201
            OpenIddict:EncryptionKey: QLQEXPlbJHOv+a+WoP4sBXzcmuy5FTnLGmnN2JlY9oI=
            OpenIddict:SigningKey: xspDY4TpiC2S/CNUVDnO9kS14HtMey90PcNIYV4kQQ4=
        volumes:
            - ./api:/api
            - /api/Application/obj
            - /api/Application/bin

    # --- CMS
    cms:
        build:
            context: ./cms
            dockerfile: dockerfile
        depends_on:
            - db
        ports:
            - "1337:1337"
        volumes:
            - strapi_uploads:/cms/public/uploads

    # -- Frontend
    front:
        build:
            context: ./front
            dockerfile: dockerfile
        ports:
            - "5173:5173"
        volumes:
            - ./front/src:/front/src
            - /front/node_modules

    # -- Tests
    test-api:
        build:
            context: ./api
            dockerfile: dockerfile
            target: test
        environment:
            ConnectionStrings__Default: "Host=db;Port=${POSTGRES_PORT};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
            ASPNETCORE_URLS: http://0.0.0.0:5201
            Strapi__ClientSecret: ${STRAPI_CLIENT_SECRET}
        depends_on:
            - api

volumes:
    postgres_data:
    strapi_uploads:
