services:
    db:
        image: postgres:16
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    api:
        build:
            context: ./api
            dockerfile: dockerfile
        ports:
            - "5201:5201"
        depends_on:
            - db
        environment:
            - ASPNETCORE_URLS=http://0.0.0.0:5201